
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RideCompare">
<title>RideCompare</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f13; --surface: #1a1a24; --surface2: #22222f; --border: #2e2e3f;
  --text: #f0f0f8; --muted: #8888a8; --accent: #6c6fff; --lyft-color: #FF00BF;
  --green: #22c55e; --red: #ef4444; --safe-bottom: env(safe-area-inset-bottom, 0px);
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; overscroll-behavior: none; }
body { display: flex; flex-direction: column; min-height: 100dvh; }
.app { flex: 1; display: flex; flex-direction: column; max-width: 540px; margin: 0 auto; width: 100%; padding: 20px 16px calc(16px + var(--safe-bottom)); }
header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg, #6c6fff, #b06cff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.new-trip-btn { background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-size: 12px; font-weight: 600; padding: 6px 12px; cursor: pointer; display: none; transition: color 0.2s, border-color 0.2s; }
.new-trip-btn:hover { color: var(--text); border-color: var(--accent); }
.new-trip-btn.show { display: block; }
.trip-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; position: relative; }
.field-stack { display: flex; flex-direction: column; gap: 8px; }
.field-line { display: flex; align-items: center; gap: 10px; position: relative; }
.dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.dot.p { background: var(--accent); } .dot.d { background: #ff6c9d; }
.vline { position: absolute; left: 4.5px; top: 22px; width: 1px; height: calc(100% - 4px); background: linear-gradient(to bottom, var(--accent), #ff6c9d); opacity: 0.3; pointer-events: none; z-index: 0; }
.field-wrap { flex: 1; position: relative; }
input[type="text"] { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 11px 34px 11px 12px; color: var(--text); font-size: 15px; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
input[type="text"]:focus { border-color: var(--accent); }
input[type="text"]::placeholder { color: var(--muted); }
.clear-x { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 4px; line-height: 1; display: none; }
.clear-x.show { display: block; }
.geo-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--muted); cursor: pointer; padding: 0 11px; font-size: 16px; height: 42px; flex-shrink: 0; transition: border-color 0.2s, color 0.2s; display: flex; align-items: center; }
.geo-btn:hover { border-color: var(--accent); color: var(--text); }
.ac-wrap { position: relative; }
.ac-list { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; z-index: 200; box-shadow: 0 8px 28px rgba(0,0,0,0.5); overflow: hidden; display: none; }
.ac-list.open { display: block; }
.ac-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.1s; }
.ac-item:last-child { border-bottom: none; }
.ac-item:hover, .ac-item:active { background: var(--surface2); }
.ac-main { font-size: 13px; font-weight: 500; color: var(--text); }
.ac-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.ride-types { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 12px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.ride-types::-webkit-scrollbar { display: none; }
.rt { background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px; padding: 8px 12px; cursor: pointer; flex-shrink: 0; text-align: center; transition: border-color 0.15s, background 0.15s; min-width: 60px; }
.rt.active { border-color: var(--accent); background: rgba(108,111,255,0.12); }
.rt-icon { font-size: 18px; display: block; }
.rt-name { font-size: 11px; font-weight: 700; margin-top: 3px; display: block; color: var(--text); }
.compare-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #6c6fff, #b06cff); border: none; border-radius: 12px; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; transition: opacity 0.2s, transform 0.1s; -webkit-tap-highlight-color: transparent; }
.compare-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.compare-btn:not(:disabled):hover { opacity: 0.88; }
.compare-btn:not(:disabled):active { transform: scale(0.98); }
.loading-row { display: none; gap: 10px; margin-bottom: 12px; }
.loading-row.show { display: flex; }
.svc-loader { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; text-align: center; }
.svc-badge { font-size: 11px; font-weight: 900; padding: 4px 8px; border-radius: 6px; display: inline-block; margin-bottom: 8px; }
.svc-badge.uber { background: #000; color: #fff; }
.svc-badge.lyft { background: var(--lyft-color); color: #fff; }
.svc-msg { font-size: 12px; color: var(--muted); }
.svc-msg.loading::after { content: ''; animation: dotdot 1.4s steps(4,end) infinite; }
@keyframes dotdot { 0% { content: '.'; } 33% { content: '..'; } 66% { content: '...'; } 100% { content: ''; } }
.results { display: none; flex-direction: column; gap: 10px; }
.results.show { display: flex; }
.best-banner { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); border-radius: 12px; padding: 10px 14px; font-size: 14px; font-weight: 700; color: var(--green); text-align: center; display: none; }
.best-banner.show { display: block; }
.result-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; overflow: hidden; }
.result-card.winner { border-color: var(--green); }
.rc-top { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); }
.rc-badge { font-size: 11px; font-weight: 900; padding: 5px 9px; border-radius: 7px; flex-shrink: 0; }
.rc-badge.uber { background: #000; color: #fff; }
.rc-badge.lyft { background: var(--lyft-color); color: #fff; }
.rc-info { flex: 1; }
.rc-svc-name { font-size: 15px; font-weight: 700; }
.rc-ride-type { font-size: 12px; color: var(--muted); margin-top: 2px; }
.rc-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.rc-price { font-size: 22px; font-weight: 800; }
.rc-best-tag { font-size: 10px; font-weight: 700; padding: 3px 7px; border-radius: 5px; background: rgba(34,197,94,0.15); color: var(--green); display: none; }
.rc-best-tag.show { display: block; }
.price-chips { padding: 10px 16px; display: flex; flex-wrap: wrap; gap: 5px; }
.chip { display: flex; align-items: center; gap: 5px; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 5px 9px; font-size: 11px; }
.chip.hi { border-color: var(--accent); background: rgba(108,111,255,0.1); }
.chip-name { color: var(--muted); }
.chip-price { font-weight: 700; color: var(--text); }
.chip.hi .chip-price { color: var(--accent); }
.book-link { display: block; margin: 0 14px 12px; padding: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; color: var(--muted); font-size: 12px; font-weight: 600; text-align: center; text-decoration: none; transition: border-color 0.2s, color 0.2s; }
.book-link:hover { border-color: var(--accent); color: var(--text); }
.rc-notice { padding: 10px 16px 14px; font-size: 12px; color: var(--muted); line-height: 1.6; text-align: center; }
.rc-notice a { color: var(--accent); text-decoration: none; }
.cookie-tip { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-top: 10px; font-size: 12px; color: var(--muted); line-height: 1.7; display: none; }
.cookie-tip.show { display: block; }
.cookie-tip strong { color: var(--text); }
.cookie-tip a { color: var(--accent); text-decoration: none; }
.hidden { display: none !important; }
</style>
</head>
<body>
<div class="app">
  <header>
    <span class="logo">🚗 RideCompare</span>
    <button class="new-trip-btn" id="new-trip-btn" onclick="resetAll()">← New trip</button>
  </header>
  <div id="trip-form">
    <div class="trip-card">
      <div class="field-stack">
        <div class="vline"></div>
        <div class="field-line">
          <div class="dot p"></div>
          <div class="field-wrap ac-wrap">
            <input type="text" id="pickup-input" placeholder="Pickup location" autocomplete="off" autocorrect="off" spellcheck="false" />
            <button class="clear-x" id="pickup-clear" onclick="clearField('pickup')">✕</button>
            <div class="ac-list" id="pickup-ac"></div>
          </div>
          <button class="geo-btn" id="geo-btn" onclick="useGeo()" title="Use my location">📍</button>
        </div>
        <div class="field-line">
          <div class="dot d"></div>
          <div class="field-wrap ac-wrap">
            <input type="text" id="dropoff-input" placeholder="Where to?" autocomplete="off" autocorrect="off" spellcheck="false" />
            <button class="clear-x" id="dropoff-clear" onclick="clearField('dropoff')">✕</button>
            <div class="ac-list" id="dropoff-ac"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="ride-types" id="ride-types"></div>
    <button class="compare-btn" id="compare-btn" onclick="compare()" disabled>Compare Prices</button>
  </div>
  <div class="loading-row" id="loading-row">
    <div class="svc-loader"><span class="svc-badge uber">UBER</span><div class="svc-msg loading" id="uber-msg">Fetching</div></div>
    <div class="svc-loader"><span class="svc-badge lyft">LYFT</span><div class="svc-msg loading" id="lyft-msg">Fetching</div></div>
  </div>
  <div class="results" id="results">
    <div class="best-banner" id="best-banner"></div>
    <div id="uber-card"></div>
    <div id="lyft-card"></div>
  </div>
  <div class="cookie-tip" id="cookie-tip">
    <strong>One-time login setup needed.</strong><br>
    Add <strong>UBER_COOKIES</strong> and <strong>LYFT_COOKIES</strong> to your Railway environment variables.<br>
    See the Variables tab in Railway
